# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2ad64215ed6185b023036c1931c8d7a8"
# The app is not deployed yet, so this is a deliberately non-resolving placeholder
# (RFC 2606 reserved ".example" TLD — never a real host). URL management is left
# to the Shopify CLI: `shopify app dev` rewrites this to the tunnel URL
# automatically (see automatically_update_urls_on_dev below), and
# `shopify app deploy` / `shopify app config link` sets your real production URL.
# Set your production host here (and in redirect_urls) before submitting.
application_url = "https://shipboost.onrender.com"
embedded = true
name = "ShipBoost"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# ShipBoost stores its settings in app-owned metafields (no scope required) and
# reads the online store theme to show its name/status on the dashboard.
#   read_themes  — required by the themes query on the dashboard.
#   read_products — required by the Product Recommendations feature: the app
#     fetches only the handful of products it needs (best sellers, a chosen
#     collection, or manual picks) and publishes a compact list to a metafield.
scopes = "read_themes,read_products"

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Mandatory GDPR/privacy compliance webhooks — required for every public App
  # Store app. These are NOT regular subscription topics: Shopify configures
  # them through this dedicated privacy_compliance block (relative paths resolve
  # against application_url, so they follow the CLI-managed dev/prod URL).
  [webhooks.privacy_compliance]
  customer_data_request_url = "/webhooks/customers/data_request"
  customer_deletion_url = "/webhooks/customers/redact"
  shop_deletion_url = "/webhooks/shop/redact"

[auth]
# OAuth callback for authPathPrefix "/auth" (app/shopify.server.ts).
redirect_urls = [ "https://shipboost.onrender.com/auth/callback" ]

[build]
automatically_update_urls_on_dev = true
